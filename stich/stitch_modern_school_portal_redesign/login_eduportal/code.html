<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EduPortal | Secure Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#b8c4ff",
                        "on-error-container": "#93000a",
                        "surface-tint": "#3755c3",
                        "outline-variant": "#c4c5d5",
                        "on-secondary-fixed": "#100069",
                        "surface-container": "#e5eeff",
                        "secondary-fixed-dim": "#c3c0ff",
                        "on-tertiary-container": "#b4bbd5",
                        "on-secondary-container": "#fffbff",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed-variant": "#3f465c",
                        "on-primary-fixed-variant": "#173bab",
                        "inverse-surface": "#213145",
                        "secondary-container": "#6860ef",
                        "tertiary-fixed-dim": "#bec6e0",
                        "on-tertiary-fixed": "#131b2e",
                        "on-surface-variant": "#444653",
                        "on-background": "#0b1c30",
                        "on-surface": "#0b1c30",
                        "primary": "#00288e",
                        "surface-variant": "#d3e4fe",
                        "surface-container-low": "#eff4ff",
                        "background": "#f8f9ff",
                        "on-secondary-fixed-variant": "#372abf",
                        "inverse-primary": "#b8c4ff",
                        "on-primary-container": "#a8b8ff",
                        "inverse-on-surface": "#eaf1ff",
                        "secondary": "#4e45d5",
                        "outline": "#757684",
                        "on-primary-fixed": "#001453",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#dce9ff",
                        "surface": "#f8f9ff",
                        "surface-bright": "#f8f9ff",
                        "primary-fixed": "#dde1ff",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#dae2fd",
                        "tertiary-container": "#434b60",
                        "secondary-fixed": "#e3dfff",
                        "surface-container-lowest": "#ffffff",
                        "tertiary": "#2d3449",
                        "error": "#ba1a1a",
                        "surface-dim": "#cbdbf5",
                        "primary-container": "#1e40af",
                        "surface-container-highest": "#d3e4fe"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "2rem",
                        "sm": "0.5rem",
                        "margin-mobile": "1rem",
                        "gutter": "1.5rem",
                        "lg": "1.5rem",
                        "max-width": "1280px",
                        "base": "4px",
                        "xl": "2.5rem",
                        "md": "1rem",
                        "xs": "0.25rem"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "display": ["Inter"],
                        "headline-sm": ["Inter"],
                        "label-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .dark .glass-card {
            background: rgba(33, 49, 69, 0.9);
        }
        .bg-mesh {
            background-color: #f8f9ff;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 64, 175, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(78, 69, 213, 0.05) 0px, transparent 50%);
        }
        .dark .bg-mesh {
            background-color: #0b1c30;
            background-image: 
                radial-gradient(at 0% 0%, rgba(184, 196, 255, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(195, 192, 255, 0.05) 0px, transparent 50%);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-icon { animation: float 4s ease-in-out infinite; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-mesh min-h-screen flex items-center justify-center p-margin-mobile transition-colors duration-300">
<!-- Dark Mode Toggle -->
<button class="fixed top-6 right-6 p-3 rounded-full bg-surface-container-high dark:bg-surface-container-highest text-primary dark:text-primary-fixed-dim shadow-sm hover:scale-110 transition-transform z-50" onclick="document.documentElement.classList.toggle('dark')">
<span class="material-symbols-outlined">dark_mode</span>
</button>
<main class="w-full max-w-[440px] relative">
<!-- Subtle Educational Motifs (Floating) -->
<div class="absolute -top-12 -left-8 text-primary/10 dark:text-primary-fixed-dim/10 float-icon" style="animation-delay: 0s;">
<span class="material-symbols-outlined text-[64px]">school</span>
</div>
<div class="absolute -bottom-12 -right-8 text-secondary/10 dark:text-secondary-fixed-dim/10 float-icon" style="animation-delay: 1.5s;">
<span class="material-symbols-outlined text-[80px]">auto_stories</span>
</div>
<div class="glass-card border border-outline-variant/30 rounded-[32px] p-8 md:p-10 shadow-2xl relative overflow-hidden">
<!-- Header section -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary-container text-on-primary-container mb-6 shadow-inner">
<span class="material-symbols-outlined text-[32px]">menu_book</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2 tracking-tight">EduPortal</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to access your dashboard</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="student-id">Student ID or Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-lowest dark:bg-inverse-surface border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none font-body-md text-on-surface placeholder:text-outline-variant" id="student-id" name="student-id" placeholder="e.g. 2024-001" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 py-3.5 bg-surface-container-lowest dark:bg-inverse-surface border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none font-body-md text-on-surface placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined" id="password-toggle-icon">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between py-1">
<label class="flex items-center space-x-2 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer appearance-none w-5 h-5 border-2 border-outline-variant rounded-md checked:bg-primary checked:border-primary transition-all cursor-pointer" type="checkbox"/>
<span class="material-symbols-outlined absolute text-[16px] text-white opacity-0 peer-checked:opacity-100 left-0.5 top-0.5 pointer-events-none">check</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-primary transition-colors">Remember Me</span>
</label>
<a class="font-label-md text-label-md text-primary dark:text-primary-fixed-dim hover:underline underline-offset-4 decoration-2" href="#">Forgot Password?</a>
</div>
<button class="w-full bg-primary text-on-primary py-4 rounded-xl font-headline-sm text-headline-sm shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                    Sign In
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<div class="mt-8 pt-8 border-t border-outline-variant/20 text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-secondary dark:text-secondary-fixed-dim font-bold hover:underline" href="#">Contact Admissions</a>
</p>
</div>
</div>
<!-- System Status or Footer -->
<div class="mt-8 flex justify-center gap-6">
<div class="flex items-center gap-2 text-on-surface-variant">
<div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
<span class="font-label-sm text-label-sm">System Operational</span>
</div>
<div class="flex items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined text-[14px]">language</span>
<span class="font-label-sm text-label-sm">English (US)</span>
</div>
</div>
</main>
<!-- Visual Polish: Decorative background elements -->
<div class="fixed inset-0 pointer-events-none -z-10">
<div class="absolute top-[10%] left-[15%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[100px] dark:bg-primary-fixed-dim/5"></div>
<div class="absolute bottom-[10%] right-[15%] w-[400px] h-[400px] bg-secondary/5 rounded-full blur-[100px] dark:bg-secondary-fixed-dim/5"></div>
</div>
<script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }

        // Add a subtle parallax effect to motifs
        document.addEventListener('mousemove', (e) => {
            const motifs = document.querySelectorAll('.float-icon');
            const x = (window.innerWidth - e.pageX) / 50;
            const y = (window.innerHeight - e.pageY) / 50;
            
            motifs.forEach((motif, index) => {
                const speed = index === 0 ? 0.5 : -0.5;
                motif.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
</body></html>
