{% extends 'base.html' %}
{% block title %}Delete Announcement{% endblock %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 3rem auto; text-align: center;">
    <h2 style="color: #c0392b;">Confirm Deletion</h2>
    <p>Are you sure you want to delete "<strong>{{ object.title }}</strong>"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn" style="background: #c0392b;">Yes, Delete</button>
        <a href="{% url 'announcement_list' %}" class="btn btn-sm">Cancel</a>
    </form>
</div>
{% endblock %}
