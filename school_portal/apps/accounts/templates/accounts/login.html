{% extends 'base.html' %}
{% block title %}Login - Nazarene School{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white rounded-xl shadow-md overflow-hidden p-8">
    <h2 class="text-3xl font-bold text-center text-[#1e3c72] mb-6">Login to Portal</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-semibold mb-2">Username</label>
            <input type="text" name="username" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#f39c12]">
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-semibold mb-2">Password</label>
            <input type="password" name="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#f39c12]">
        </div>
        <button type="submit" class="w-full bg-[#1e3c72] hover:bg-[#2c4a8c] text-white font-bold py-2 px-4 rounded-lg transition duration-300">
            Log In
        </button>
    </form>
    <div class="text-center mt-4">
        <a href="{% url 'password_reset' %}" class="text-[#f39c12] hover:text-[#e67e22] text-sm font-semibold">
            Forgot your password?
        </a>
    </div>
    <p class="text-center text-gray-500 text-sm mt-4">
        Students: Use your registration number as username.
    </p>
</div>
{% endblock %}
