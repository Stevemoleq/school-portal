{% extends 'base.html' %}
{% block title %}Password Reset - Nazarene School{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white rounded-xl shadow-md overflow-hidden p-8">
    <h2 class="text-3xl font-bold text-center text-[#1e3c72] mb-2">Reset Your Password</h2>
    <p class="text-center text-gray-600 text-sm mb-6">Enter your email address and we'll send you instructions to reset your password.</p>
    
    <form method="post">
        {% csrf_token %}
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-semibold mb-2">Email Address</label>
            <input type="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#f39c12]">
        </div>
        <button type="submit" class="w-full bg-[#1e3c72] hover:bg-[#2c4a8c] text-white font-bold py-2 px-4 rounded-lg transition duration-300">
            Send Reset Email
        </button>
    </form>
    
    <div class="text-center mt-6">
        <a href="{% url 'login' %}" class="text-[#f39c12] hover:text-[#e67e22] text-sm font-semibold">
            Back to Login
        </a>
    </div>
</div>
{% endblock %}
