{% extends 'base.html' %}
{% block title %}Password Reset — Nazarene School{% endblock %}
{% block page_title %}Password Reset{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="scholarly-glass p-8 sm:p-10 text-center">
        <div class="w-14 h-14 rounded-2xl bg-scholarly-primary-container text-white flex items-center justify-center mx-auto mb-4" style="background: #1e40af; color: white;">
            <i class="fas fa-key text-xl"></i>
        </div>
        <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-2">Reset Your Password</h2>
        <p class="text-sm text-slate-500 dark:text-slate-400 mb-8">Enter your email and we'll send you reset instructions.</p>

        <form method="post" class="space-y-4 text-left">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Email Address</label>
                <input type="email" name="email" required class="w-full px-4 py-2.5 bg-white/70 dark:bg-slate-800/50 border border-slate-200/60 dark:border-slate-700/60 rounded-xl text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-scholarly-primary/30 focus:border-scholarly-primary" placeholder="you@example.com">
            </div>
            <button type="submit" class="scholarly-btn-primary w-full">
                <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>
        </form>

        <div class="mt-6 pt-4 border-t border-slate-200/60 dark:border-slate-700/60">
            <a href="{% url 'login' %}" class="text-sm text-scholarly-primary hover:text-scholarly-secondary font-medium transition">
                <i class="fas fa-arrow-left text-xs mr-1"></i> Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
