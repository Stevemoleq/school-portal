{% extends 'base.html' %}
{% block title %}Password Reset Successful - Nazarene School{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white rounded-xl shadow-md overflow-hidden p-8">
    <div class="text-center">
        <div class="mb-4 text-5xl">✅</div>
        <h2 class="text-3xl font-bold text-[#1e3c72] mb-4">Password Reset Successful</h2>
        <p class="text-gray-600 mb-8">
            Your password has been successfully reset. You can now log in with your new password.
        </p>
        <a href="{% url 'login' %}" class="inline-block bg-[#1e3c72] hover:bg-[#2c4a8c] text-white font-bold py-2 px-6 rounded-lg transition duration-300">
            Go to Login
        </a>
    </div>
</div>
{% endblock %}
