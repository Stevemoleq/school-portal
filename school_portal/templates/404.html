{% extends 'base.html' %}
{% block title %}Page Not Found — Nazarene School{% endblock %}
{% block page_title %}404{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-16 sm:py-24 text-center">
    <div class="relative mb-8">
        <span class="text-[8rem] sm:text-[10rem] font-black text-surface-200 dark:text-surface-800 leading-none select-none">404</span>
        <div class="absolute inset-0 flex items-center justify-center">
            <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center shadow-xl shadow-brand-500/30 rotate-12 hover:rotate-0 transition-transform duration-500">
                <i class="fas fa-ghost text-white text-3xl"></i>
            </div>
        </div>
    </div>
    <h2 class="text-2xl font-bold text-surface-900 dark:text-white mb-3">Page Not Found</h2>
    <p class="text-surface-500 dark:text-surface-400 max-w-md mb-8">
        The page you're looking for doesn't exist or has been moved.
    </p>
    <div class="flex flex-wrap justify-center gap-3">
        <a href="{% url 'home' %}" class="btn btn-primary">
            <i class="fas fa-home"></i> Go Home
        </a>
        <button onclick="history.back()" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Go Back
        </button>
    </div>
</div>
{% endblock %}
