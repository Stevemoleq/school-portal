services:
  - type: web
    name: school-portal
    env: python
    plan: free
    rootDir: school_portal
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py collectstatic --noinput --clear
      python manage.py create_admin
    startCommand: gunicorn school_portal.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: school-portal-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"          # <-- add this line