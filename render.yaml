databases:
  - name: school-portal-db
    plan: free
    databaseName: school_portal
    ipAllowList: []

services:
  - type: web
    name: school-portal
    env: python
    plan: free
    rootDir: school_portal
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py collectstatic --noinput --clear
      echo "=== RUNNING CREATE_ADMIN ==="
      python manage.py create_admin
      echo "=== RUNNING SEED_FAKE_DATA ==="
      python manage.py seed_fake_data --clear
      echo "=== BUILD COMMANDS COMPLETE ==="
    startCommand: gunicorn school_portal.wsgi:application --workers 3 --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://school-portal.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: school-portal-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"