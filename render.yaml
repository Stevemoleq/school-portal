# yaml-language-server: $schema=https://raw.githubusercontent.com/render-oss/render-yaml-spec/main/schema.json
services:
  - type: web
    name: school-portal
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt && \
      python manage.py collectstatic --noinput && \
      python manage.py migrate
    startCommand: gunicorn school_portal.wsgi
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "your-app-name.onrender.com"
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: school-portal-db
    engine: postgresql  # yaml: ignore
    version: "15"  # yaml: ignore
    ipAllowList: []

