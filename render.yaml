services:
  - type: web
    name: school-portal
    env: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt && \
      python school_portal/manage.py collectstatic --noinput && \
      python school_portal/manage.py migrate

    startCommand: gunicorn school_portal.wsgi:application

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3

      - key: DEBUG
        value: "False"

      - key: SECRET_KEY
        generateValue: true

      - key: ALLOWED_HOSTS
        value: "school-portal.onrender.com"

      - key: DATABASE_URL
        fromDatabase:
          name: school-portal-db
          property: connectionString

databases:
  - name: school-portal-db
    databaseName: school_portal_db
    plan: free